<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="日历 - 离线可用的渐进式网页应用">
    <meta name="theme-color" content="#1d1d1f">
    <title>日历</title>
    
    <!-- PWA manifest -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" sizes="192x192" href="icons/icon-192x192.svg">
    <link rel="icon" type="image/svg+xml" sizes="512x512" href="icons/icon-512x512.svg">
    <link rel="apple-touch-icon" href="icons/icon-192x192.svg">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css?v=1.3">
</head>
<body>
    <div id="app">

        <!-- Navigation -->
        <nav class="nav">
            <div class="nav-left">
                <button id="prev-month" class="nav-btn">‹</button>
                <div class="nav-date">
                    <input type="month" id="current-month" class="month-year"
                           min="1900-01"
                           max="2100-12">
                </div>
                <button id="next-month" class="nav-btn">›</button>
            </div>
            <div class="nav-right">
                <button id="today-btn" class="today-btn">今日</button>
                <button id="dark-toggle" class="nav-btn dark-toggle">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                    <svg class="icon-auto" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Calendar -->
        <main class="calendar-container">
            <div class="weekdays">
                <div class="weekday">一</div>
                <div class="weekday">二</div>
                <div class="weekday">三</div>
                <div class="weekday">四</div>
                <div class="weekday">五</div>
                <div class="weekday">六</div>
                <div class="weekday">日</div>
            </div>
            <div id="calendar-grid-wrapper" class="calendar-grid-wrapper">
                <div id="calendar-grid" class="calendar-grid">
                    <!-- Calendar days will be generated by JavaScript -->
                </div>
            </div>
        </main>

        <!-- Day Detail Panel (below calendar) -->
        <div id="day-detail" class="day-detail" style="display: none;">
            <div class="detail-header">
                <span id="detail-date" class="detail-date"></span>
            </div>
            <div class="detail-body">
                <!-- Row 1: 农历 生肖 年份 -->
                <div class="detail-row">
                    <span class="detail-label">农历</span>
                    <span id="detail-lunar" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">生肖</span>
                    <span id="detail-zodiac" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">年份</span>
                    <span id="detail-year" class="detail-value"></span>
                </div>
                <!-- Row 2: 干支 节日 节气 -->
                <div class="detail-row">
                    <span class="detail-label">干支</span>
                    <span id="detail-ganzhi" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">节日</span>
                    <span id="detail-festival" class="detail-value"></span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">节气</span>
                    <span id="detail-solarterm" class="detail-value"></span>
                </div>
            </div>
            </div>
        </div>


    </div>

    <!-- Scripts -->
    <script src="js/lunar.js"></script>
    <script src="js/calendar.js"></script>
    <script src="js/holiday.js"></script>
    <script src="js/app.js?v=1.3"></script>
    
    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('SW registered: ', registration);
                    })
                    .catch(registrationError => {
                        console.log('SW registration failed: ', registrationError);
                    });
            });
        }
    </script>
</body>
</html>
